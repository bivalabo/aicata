name: 機能リクエスト
description: 新機能や改善の提案
labels: ["enhancement"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: どんな機能が必要ですか？
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: 背景・動機
      description: なぜこの機能が必要ですか？どんな課題を解決しますか？
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 解決策のイメージ
      description: どのような実装をイメージしていますか？

  - type: dropdown
    id: area
    attributes:
      label: 対象領域
      options:
        - "app/ (Shopify Remix)"
        - "web/ (Next.js)"
        - "両方"
        - "その他"
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 優先度
      options:
        - "高 - ブロッカー"
        - "中 - 次スプリント"
        - "低 - いつかやりたい"
    validations:
      required: true
