# Aicata - Shopify App Configuration
# https://shopify.dev/docs/apps/tools/cli/configuration

name = "Aicata"
client_id = "your_client_id_here"
application_url = "https://your-app-url.trycloudflare.com"
embedded = true

[access_scopes]
scopes = "write_themes,read_themes,write_content,read_content,read_products,read_orders,read_analytics"

[auth]
redirect_urls = [
  "https://your-app-url.trycloudflare.com/auth/callback",
  "https://your-app-url.trycloudflare.com/auth/shopify/callback",
  "https://your-app-url.trycloudflare.com/api/auth/callback"
]

[webhooks]
api_version = "2025-01"

  [webhooks.subscriptions]

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks"

  [[webhooks.subscriptions]]
  topics = [ "shop/update" ]
  uri = "/webhooks"

[pos]
embedded = false
